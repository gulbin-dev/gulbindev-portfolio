name: Testing pull request code

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write

jobs:
  test:
    name: Run Vitest Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Specify your project's Node version
          cache: "npm" # Automatically caches dependencies for faster workflows

      - name: Install dependencies
        run: npm ci # "npm ci" is cleaner and faster than "npm install" for CI pipelines

      - name: Execute Vitest tests
        run: npx vitest run
